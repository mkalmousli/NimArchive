name: Site Sync

on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

permissions:
  contents: write

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Publish site only
        run: uv run archive.py site
