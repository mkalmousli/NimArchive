name: Archive Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    env:
      MAX_PACKAGES: ${{ vars.MAX_PACKAGES || '' }}
      DATA_REPO_SLUG: ${{ vars.DATA_REPO_SLUG || 'mkalmousli/NimArchiveData' }}
      DATA_REPO_BRANCH: ${{ vars.DATA_REPO_BRANCH || 'main' }}
      DATA_REPO_PUSH_TOKEN: ${{ secrets.DATA_REPO_PUSH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run archiver
        run: uv run archive.py
